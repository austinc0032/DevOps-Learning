{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="card-title mb-4">Submit a New Ticket</h3>
        <form method="post">
          {{ form.hidden_tag() }}
          <div class="mb-3">
            {{ form.title.label(class_='form-label') }}
            {{ form.title(class_='form-control') }}
          </div>
          <div class="mb-3">
            {{ form.description.label(class_='form-label') }}
            {{ form.description(class_='form-control', rows=7) }}
          </div>
          <button type="submit" class="btn btn-success">Submit Ticket</button>
          <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary ms-2">Back</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
